defaults:
  # 先加载当前文件，再叠加下面这些配置组。
  - _self_
  - model_defaults: defaults        # 所有模型共用的默认参数。
  - features_defaults: features_defaults  # 刺激特征提取器的默认参数。
  - model: clip_conv                # 当前任务使用的模型配置模板。
  - feature_model: none             # 是否额外使用特征模型，例如 DeepMel；none 表示不用。
  - selections: selections_definitions  # 数据集选择名到真实 study 的映射。
  - study_paths: study_paths        # 各数据集在本机上的存放路径。

# Weights & Biases 记录配置；默认关闭，不影响本地训练。
wandb:
  use_wandb: false                  # true 时把指标同步到 wandb。
  project: brainmagick              # wandb 项目名。
  group: brainmagick-group          # wandb 分组名。

# 运行时日志和设备配置；这些通常只影响执行方式，不改变实验语义。
num_prints: 10                       # 每个阶段进度条/日志大约打印多少次。
device: cuda                        # 训练设备；无 GPU 时可改为 cpu。
num_workers: 1                      # DataLoader 子进程数；Windows 下建议从 0 或 1 开始。
verbose: 0                          # 设为 1 时输出更详细的调试日志。
show: 0                             # 设为 1 时只打印模型结构和参数规模，然后退出。
download_only: false                # true 时只下载/预处理数据，不进入训练。

# SLURM 集群任务的默认资源；本地 dora run 通常不会用到。
slurm:
  mem_per_gpu: 100                  # 每张 GPU 申请的内存，单位 GB。
  time: 4320                        # 作业最长运行时间，单位分钟。

continue_sig:                       # 要接着训练的 Dora 实验签名；留空表示不续训。
continue_best: true                 # 续训时加载最佳 checkpoint；false 则加载最后一次状态。

# 实验可复现性、缓存和早停相关设置。
seed: 2036                          # 随机种子。
dummy:  gwilliams_bs128                             # 给实验人为加标签；会改变 Dora 签名，但不改变训练逻辑。
cache: ./cache_gwilliams2022_clip   # 中间缓存目录，例如预处理后的脑信号和 Wav2Vec 特征。
features_models: ./features_models  # 特征模型或预训练模型的本地缓存目录。
early_stop_patience: 5              # 验证集 loss 连续多少个 epoch 不提升后早停。
eval_every: 1                      # 每隔多少个 epoch 做一次测试集评估。
eval_train_set: false               # true 时额外在训练集上评估，主要用于调试。

# 优化器和训练轮数配置。
optim:
  name: adam                         # 当前仅支持 adam。
  lr: 3e-4                           # 学习率。
  beta2: 0.999                       # Adam 的 beta2 参数。
  epochs: 40                         # 最大训练 epoch 数。
  batch_size: 32                     # 全局 batch size；多 GPU 时会按 GPU 数拆分。
  loss: l1                           # 损失函数：l1、mse、clip 或 regression_classification。
  use_weighting: false               # 分类特征是否按类别频率加权。
  max_batches:                       # 每个 epoch 最多训练多少个 batch；留空表示跑完整个 epoch。
  svd: 0.                            # SVD 正则强度；0 表示关闭。
  negatives:                         # CLIP loss 额外负样本数；留空则使用当前 batch 内负样本。
  negative_pool_size:                # 额外负样本池大小；通常和 negatives 配套使用。

# CLIP/对比学习损失的细节配置。
clip:
  linear:                            # 计算 CLIP 前可选的线性投影维度；留空表示不用。
  twin: true                         # true 表示预测值和真实值共用同一套 CLIP 投影。
  pool: false                        # true 时先沿时间池化，再计算对比损失。
  tmin:                              # 评估 CLIP loss 时截取的起始时间；留空用完整窗口。
  tmax:                              # 评估 CLIP loss 时截取的结束时间；留空用完整窗口。
  tmin_train:                        # 训练阶段单独使用的起始时间。
  tmax_train:                        # 训练阶段单独使用的结束时间。
  center: false                      # 是否对 CLIP 表征做中心化。

# 测试阶段的词错误率/检索指标配置。
test:
  wer_negatives: 2_000               # WER 评估最多使用多少个负样本。
  wer_topx: 10                       # top-k 检索中的 k 值。
  wer_random: false                  # true 时用随机预测做基线。
  wer_recordings: 4                  # WER 只评估前 N 个 recording；留空表示全部。
  wer_study:                         # 多 study 训练时，只评估指定 study；留空表示不筛选。

# 数据集、切片窗口、划分方式和刺激特征配置。
dset:
  selections:
    - gwilliams2022                  # 使用的 selection 名称；定义见 selections_definitions.yaml。
  tmin: -0.5                         # 每个样本相对事件起点的开始时间，单位秒。
  tmax: 2.5                          # 每个样本相对事件起点的结束时间，单位秒。
  n_recordings: 1000                 # 最多加载多少个 recording。
  n_subjects:                        # 最多使用多少名受试者；留空表示不限制。
  n_subjects_test:                   # 测试集最多使用多少名受试者；应小于等于 n_subjects。
  shuffle_recordings_seed: -1        # recording 打乱种子；-1 表示不打乱。
  skip_recordings: 0                 # 跳过前 N 个 recording，常用于分批调试。
  test_ratio: 0.2                    # block 中分给测试集的比例。
  valid_ratio: 0.1                   # block 中分给验证集的比例。
  remove_ratio: 0.                   # 从训练集中移除的 block 比例；0 表示不移除。
  condition: 0.5                     # 若为数字，表示每隔多少秒采样；若为字符串，则按事件条件采样。
  apply_baseline: true               # 是否用事件前 0.3 秒均值做 MEG baseline 去除。
  min_block_duration: 6              # block 最小时长；过短 block 会被合并。
  force_uid_assignement: false       # true 时禁止合并 block；schoffelen2019 常需要开启。
  min_n_blocks_per_split: 1          # 每个 split 至少需要多少个 block；不足时直接报错。
  ignore_end_in_block: false         # true 时允许样本结束点越过 split block 边界，可能引入泄漏。
  ignore_start_in_block: false       # true 时允许样本开始点越过 split block 边界。
  sample_rate: 120                   # 所有 study 统一重采样到的采样率，单位 Hz。
  highpass: 0                        # 高通滤波频率，单位 Hz；0 表示不开启。
  event_mask: true                   # 是否返回刺激发生时间 mask；非对比损失可用它只在刺激处算 loss。
  split_wav_as_block: true           # 是否按 split 边界切分音频，避免音频特征跨训练/测试泄漏。
  allow_empty_split: false           # true 时允许某些 split 为空；小数据调试时才建议使用。
  autoreject: false                  # 是否启用 autoreject 自动剔除坏段；很慢且占内存。
  test:                              # 测试集专用覆盖项；值不为空时才覆盖上面的 dset 参数。
    tmin:
    tmax:
    condition: word                  # 测试集默认按 word 事件取样。
  features:
    - Wav2VecTransformer             # 刺激表征；这里使用 Wav2Vec 2.0 特征。
  extra_test_features: []            # 只在测试阶段额外加载的特征。

override_n_subjects_model:           # 加载旧模型时覆盖模型里的受试者数量，通常不用。

# 归一化和异常值裁剪配置。
norm:
  scaler:
    per_channel: False               # 特征是否按通道分别归一化。
    n_samples_per_recording: 200     # 每个 recording 抽多少个脑信号样本估计归一化统计量。
    n_samples_features: 8000         # 抽多少个特征样本估计归一化统计量。
  max_scale: 20.                     # 归一化后绝对值超过该阈值的样本会被裁剪或丢弃。
  clip: true                         # true 表示裁剪到 max_scale；false 表示直接拒绝该样本。
  exclude_empty_features: false      # 是否丢弃窗口内没有任何刺激特征的样本。

# 任务定义：decode 是从脑信号预测刺激表征，encode 是反向预测脑信号。
task:
  type: decode                       # decode 或 encode。
  meg_init: 0.3                      # encode 任务中作为提示输入的脑信号时长，单位秒。
  lowpass: 0                         # 对脑信号做低通滤波的频率；0 表示不启用。
  offset_meg_ms: 0                   # 将 MEG 相对刺激向后平移多少毫秒，用于补偿脑反应延迟。
  lowpass_gt: True                   # encode 训练时是否也低通 ground truth。
  lowpass_gt_test: False             # encode 测试时是否低通 ground truth。
  mask_loss: false                   # 是否只在刺激 mask 为 true 的位置计算 loss；对 CLIP 不适用。

# Dora/Hydra 实验管理配置。
dora:
  dir: ./outputs                     # 实验输出目录，包含日志、checkpoint、tensorboard 等。
  exclude: [
    'wandb.*', 'num_prints', 'device', 'num_workers',
    'verbose', 'cache', 'features_models',
  ]                                  # 这些运行环境参数不参与 Dora 签名计算。
  git_save: true                     # grid 运行时是否保存当前 git 版本，方便复现实验。
